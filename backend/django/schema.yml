      - run
    ReviewComment:
      type: object
      description: Serializer for ReviewComment model.
      properties:
        id:
          type: integer
          readOnly: true
        file_path:
          type: string
          readOnly: true
          description: File path relative to repository root.
        line_number:
          type: integer
          readOnly: true
          description: Line number in the diff.
        body:
          type: string
          readOnly: true
          description: Comment body/description.
        severity:
          allOf:
          - $ref: '#/components/schemas/SeverityEnum'
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/CategoryEnum'
          readOnly: true
        suggested_fix:
          type: string
          readOnly: true
          description: Suggested code fix in diff format.
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - body
      - category
      - created_at
      - file_path
      - id
      - line_number
      - severity
      - suggested_fix
    ReviewList:
      type: object
      description: |-
        Lightweight Review serializer for list endpoint.
        No nested comments to reduce payload size.
      properties:
        id:
          type: integer
          readOnly: true
        repository:
          type: integer
        repository_name:
          type: string
          readOnly: true
        pr_number:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
