      - completed_at
      - created_at
      - id
      - pr_number
      - pr_title
      - repository
      - repository_name
    ReviewRun:
      type: object
      description: Serializer for ReviewRun model.
      properties:
        id:
          type: integer
          readOnly: true
        agent_iterations:
          type: integer
          readOnly: true
          description: Number of agent retry iterations.
        model_used:
          type: string
          readOnly: true
          description: LLM model that generated the review (e.g. google/gemini-2.0-flash).
        prompt_tokens:
