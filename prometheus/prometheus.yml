global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'django'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/metrics'
    scheme: http
    scrape_interval: 15s

  - job_name: 'fastapi'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/fastapi-metrics'
    scheme: http
    scrape_interval: 15s
